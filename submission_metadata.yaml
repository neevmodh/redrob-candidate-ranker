# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Kiro (Claude)"

ai_usage_summary: |
  Used Kiro (Claude-based) for architecture discussion, planning, and code review.
  All scoring logic (skill trust scoring, career trajectory analysis, services-company
  penalty, behavioral multiplier) is hand-engineered based on careful JD analysis.
  No candidate data was fed to any LLM. The final system is fully deterministic
  feature engineering with zero external API calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-signal feature-engineering ranker with anti-keyword-stuffing design.
  Five scoring components: skill match (35%), career trajectory (30%), experience
  (20%), education (5%), and a behavioral availability multiplier (applied post-score).

  Skill scoring uses a trust multiplier — endorsements × duration × proficiency —
  so "expert FAISS with 0 months used" scores near zero, catching keyword stuffers.
  Career trajectory applies a services-company penalty (TCS/Infosys/Wipro/Accenture
  careers score 0.25× multiplier) and requires JD-relevant keywords in role
  descriptions, not just in the skills list. Behavioral signals (open_to_work,
  last_active_date, recruiter_response_rate, notice_period) are combined into a
  multiplier in [0.50, 1.20] applied to the base score.

  Honeypot detection flags candidates with 2+ impossible-profile signals (expert
  skills with 0 months used, inflated tenure ratios). 13 detected; all forced below
  rank 100. Runtime: ~25 seconds on CPU for 100K candidates. No GPU, no network,
  no model downloads.

